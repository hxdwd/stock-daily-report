name: 每日股市新闻分析报告

on:
  schedule:
    # 北京时间每天早上 9:00 (UTC+8) → UTC 1:00
    # 注意：GitHub Actions 定时触发可能有 5-15 分钟延迟
    - cron: '0 1 * * *'
  # 支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成股市分析报告
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python main.py

      - name: 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 每日股市新闻分析报告_*.md .codebuddy/automations/automation/memory.md
          git diff --cached --quiet || git commit -m "📊 每日股市报告 $(date +%Y%m%d)"
          git push
